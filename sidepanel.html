<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
  <script src="sidepanel.js" defer></script>
</head>
<body>
  <div class="app-container">
    <!-- Active State: LeetCode problem is active -->
    <main id="active-panel" class="panel-state hidden">
      <header class="header">
        <div class="brand-row">
          <div class="logo-group">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
            </svg>
            <span class="logo-text">Leet<span class="highlight">Notes</span></span>
          </div>
          <span id="save-status" class="status-badge idle">
            <span class="status-dot"></span>
            <span class="status-text">All changes saved</span>
          </span>
        </div>
        
        <div class="problem-card">
          <h1 id="problem-title" class="problem-title">Problem Notes</h1>
          <p id="problem-slug" class="problem-slug"></p>
        </div>
      </header>

      <section class="editor-section">
        <div class="editor-wrapper">
          <textarea id="notes-textarea" placeholder="Write your notes here... (auto-saves automatically)"></textarea>
          <div class="textarea-glow"></div>
        </div>
      </section>
    </main>

    <!-- Empty State: Not on a LeetCode problem page -->
    <div id="empty-panel" class="panel-state">
      <div class="empty-content">
        <div class="animated-graphic">
          <div class="circle outer"></div>
          <div class="circle inner"></div>
          <svg class="graphic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
          </svg>
        </div>
        <h2>No Problem Detected</h2>
        <p>Navigate to any LeetCode problem page to start writing notes. Your notes will save automatically and sync across your devices.</p>
        <a href="https://leetcode.com/problemset/" target="_blank" class="explore-btn">
          Explore LeetCode
        </a>
      </div>
    </div>
  </div>
</body>
</html>
